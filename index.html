<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Desahogo - Libro Digital</title>

<style>
/*=========================================================
                    AJUSTE GENERAL
=========================================================*/
* {
    box-sizing: border-box;
}

/*=========================================================
                    FONDO Y CENTRADO
=========================================================*/
body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle, #2b2b3d, #111118);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: auto;
}

/*=========================================================
                    CONTENEDOR PRINCIPAL
=========================================================*/
#contenedor {
    width: 100%;
    text-align: center;
    color: white;
    padding: 15px;
}

/*=========================================================
                    TÍTULO
=========================================================*/
h1 {
    margin: 10px 0 15px;
    font-size: clamp(22px, 5vw, 38px);
    color: #d4af37;
}

/*=========================================================
                    CONTENEDOR DEL LIBRO
=========================================================*/
#book {
    width: 900px;
    height: 620px;
    margin: auto;
}

/*=========================================================
                    CADA HOJA
=========================================================*/
.page {
    background: white;
    overflow: hidden;
}

/*=========================================================
                    CANVAS DEL PDF
=========================================================*/
.page canvas {
    width: 100%;
    height: 100%;
    display: block;
}

/*=========================================================
                    TEXTO INFERIOR
=========================================================*/
#info {
    margin-top: 15px;
    font-size: 15px;
    color: #ddd;
}

/*=========================================================
                    CELULAR
=========================================================*/
@media (max-width: 768px) {
    body {
        align-items: flex-start;
    }

    #contenedor {
        padding: 10px;
    }

    #book {
        width: 95vw;
        height: 70vh;
    }

    h1 {
        font-size: 24px;
    }
}
</style>
</head>

<body>

<div id="contenedor">

    <h1>El Desahogo</h1>

    <!-- Aquí se arma el libro -->
    <div id="book"></div>

    <div id="info">Cargando PDF...</div>

</div>

<!-- Lee el PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- Animación tipo libro -->
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>
/*=========================================================
                    RUTA DEL PDF
=========================================================*/

/*
    Tu PDF está en la misma carpeta que index.html:

    Repositorio/
    ├── index.html
    └── El Desahogo.pdf
*/

const url = "./El Desahogo.pdf";

/*=========================================================
                    WORKER DE PDF.JS
=========================================================*/

pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/*=========================================================
                    ELEMENTOS HTML
=========================================================*/

const bookContainer = document.getElementById("book");
const info = document.getElementById("info");

let pageFlip = null;

/*=========================================================
                    DETECTAR CELULAR
=========================================================*/

function esCelular() {
    return window.innerWidth <= 768;
}

/*=========================================================
                    CREAR PÁGINA PDF
=========================================================*/

async function crearPaginaPDF(pdf, numeroPagina) {

    const page = await pdf.getPage(numeroPagina);

    const viewport = page.getViewport({
        scale: esCelular() ? 1.3 : 1.7
    });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
        canvasContext: ctx,
        viewport: viewport
    }).promise;

    const pageDiv = document.createElement("div");
    pageDiv.className = "page";
    pageDiv.appendChild(canvas);

    return pageDiv;
}

/*=========================================================
                    CARGAR LIBRO
=========================================================*/

async function cargarPDF() {

    try {

        info.textContent = "Buscando PDF...";

        const pdf = await pdfjsLib.getDocument({
            url: url
        }).promise;

        info.textContent = "Preparando libro...";

        bookContainer.innerHTML = "";

        /*
            ORDEN:

            PDF página 1 = portada sola.

            Al abrir:
            PDF página 2 y 3 juntas.

            Después:
            PDF página 4 y 5 juntas.
        */

        for (let i = 1; i <= pdf.numPages; i++) {
            const pagina = await crearPaginaPDF(pdf, i);
            bookContainer.appendChild(pagina);
        }

        pageFlip = new St.PageFlip(bookContainer, {

            width: esCelular() ? 320 : 450,
            height: esCelular() ? 480 : 620,

            /*
                PC: fixed evita el desplazamiento raro.
                Celular: stretch se adapta mejor.
            */
            size: esCelular() ? "stretch" : "fixed",

            minWidth: 260,
            maxWidth: 1000,
            minHeight: 360,
            maxHeight: 1400,

            /*
                Primera página como portada individual.
            */
            showCover: true,

            /*
                En celular se muestra una página.
            */
            usePortrait: esCelular(),

            /*
                Mejor respuesta del dedo para hojear.
            */
            mobileScrollSupport: false,

            startPage: 0,
            flippingTime: 1200,
            drawShadow: true,
            maxShadowOpacity: 0.28,

            /*
                En PC no se autoajusta para evitar saltos.
                En celular sí.
            */
            autoSize: esCelular(),

            startZIndex: 10,
            clickEventForward: true,
            useMouseEvents: true,
            swipeDistance: 20
        });

        const paginas = Array.from(document.querySelectorAll(".page"));

        pageFlip.loadFromHTML(paginas);

        setTimeout(() => {
            pageFlip.update();
        }, 300);

        info.textContent = "Portada";

        pageFlip.on("flip", (e) => {
            const paginaActual = e.data + 1;

            if (paginaActual === 1) {
                info.textContent = "Portada";
            } else {
                info.textContent = `Página ${paginaActual}`;
            }
        });

    } catch (error) {

        console.error(error);

        info.textContent = "No se pudo cargar el PDF.";

        alert(
            "No se pudo cargar el PDF.\n\n" +
            "Revisa que el archivo esté en la misma carpeta que index.html y se llame exactamente:\n\n" +
            "El Desahogo.pdf"
        );
    }
}

/*=========================================================
                    INICIAR
=========================================================*/

cargarPDF();
</script>

</body>
</html>
