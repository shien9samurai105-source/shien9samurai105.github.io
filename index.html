<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Desahogo - Libro Digital</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle, #2b2b3d, #111118);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: auto;
}

#contenedor {
  width: 100%;
  text-align: center;
  color: white;
  padding: 15px;
}

h1 {
  margin: 10px 0 15px;
  font-size: clamp(22px, 5vw, 38px);
  color: #d4af37;
}

#book {
  width: 900px;
  height: 620px;
  margin: auto;
}

.page {
  background: white;
  overflow: hidden;
}

.page canvas {
  width: 100%;
  height: 100%;
  display: block;
}

#info {
  margin-top: 15px;
  font-size: 15px;
  color: #ddd;
}

@media (max-width: 768px) {
  #book {
    width: 320px;
    height: 480px;
  }

  h1 {
    font-size: 24px;
  }
}
</style>
</head>

<body>

<div id="contenedor">
  <h1>El Desahogo</h1>
  <div id="book"></div>
  <div id="info">Cargando PDF...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>
/* Nombre del libro */
const nombreLibro = "El Desahogo";

/* Ruta del PDF dentro del repositorio */
const url = encodeURI(`pdf/${nombreLibro}.pdf`);

pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const bookContainer = document.getElementById("book");
const info = document.getElementById("info");

let pageFlip = null;

function esCelular() {
  return window.innerWidth <= 768;
}

async function crearPaginaPDF(pdf, numeroPagina) {
  const page = await pdf.getPage(numeroPagina);

  const viewport = page.getViewport({
    scale: esCelular() ? 1.4 : 1.7
  });

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = viewport.width;
  canvas.height = viewport.height;

  await page.render({
    canvasContext: ctx,
    viewport: viewport
  }).promise;

  const pageDiv = document.createElement("div");
  pageDiv.className = "page";
  pageDiv.appendChild(canvas);

  return pageDiv;
}

async function cargarPDF() {
  try {
    const pdf = await pdfjsLib.getDocument(url).promise;

    info.textContent = "Preparando libro...";
    bookContainer.innerHTML = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const pagina = await crearPaginaPDF(pdf, i);
      bookContainer.appendChild(pagina);
    }

    pageFlip = new St.PageFlip(bookContainer, {
      width: esCelular() ? 320 : 450,
      height: esCelular() ? 480 : 620,

      size: "fixed",

      showCover: true,
      usePortrait: esCelular(),
      mobileScrollSupport: true,

      startPage: 0,
      flippingTime: 1200,
      drawShadow: true,
      maxShadowOpacity: 0.28,
      autoSize: false,

      startZIndex: 10,
      clickEventForward: true,
      useMouseEvents: true,
      swipeDistance: 30
    });

    const paginas = Array.from(document.querySelectorAll(".page"));
    pageFlip.loadFromHTML(paginas);

    setTimeout(() => {
      pageFlip.update();
    }, 300);

    info.textContent = "Portada";

    pageFlip.on("flip", (e) => {
      const paginaActual = e.data + 1;

      if (paginaActual === 1) {
        info.textContent = "Portada";
      } else {
        info.textContent = `Página ${paginaActual}`;
      }
    });

  } catch (error) {
    console.error(error);
    info.textContent = "No se pudo cargar el PDF.";
    alert("No se pudo cargar el PDF. Revisa que esté en la carpeta pdf del repositorio.");
  }
}

cargarPDF();
</script>

</body>
</html>
