<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- Hace que funcione bien en celulares -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Desahogo - Libro Digital</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle, #2b2b3d, #111118);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: auto;
}

#contenedor {
  width: 100%;
  text-align: center;
  color: white;
  padding: 15px;
}

h1 {
  margin: 10px 0 15px;
  font-size: clamp(22px, 5vw, 38px);
  color: #d4af37;
}

/* Tamaño del libro en computadora */
#book {
  width: 900px;
  height: 620px;
  margin: auto;
}

/* Cada página del libro */
.page {
  background: white;
  overflow: hidden;
}

/* Página del PDF dibujada */
.page canvas {
  width: 100%;
  height: 100%;
  display: block;
}

#info {
  margin-top: 15px;
  font-size: 15px;
  color: #ddd;
}

/* Ajuste para celular */
@media (max-width: 768px) {
  body {
    align-items: flex-start;
  }

  #contenedor {
    padding: 10px;
  }

  #book {
    width: 95vw;
    height: 70vh;
  }

  h1 {
    font-size: 24px;
  }
}
</style>
</head>

<body>

<div id="contenedor">
  <h1>El Desahogo</h1>

  <!-- Aquí aparece el libro -->
  <div id="book"></div>

  <!-- Estado del libro -->
  <div id="info">Cargando PDF...</div>
</div>

<!-- PDF.js: lee el PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- PageFlip: efecto de libro -->
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>
/* =========================================================
   RUTA DEL PDF

   Estructura recomendada:
   proyecto/
   ├── index.html
   └── pdf/
       └── el-desahogo.pdf
========================================================= */
const url = "pdf/el-desahogo.pdf";

/* =========================================================
   WORKER DE PDF.JS
========================================================= */
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* =========================================================
   ELEMENTOS PRINCIPALES
========================================================= */
const bookContainer = document.getElementById("book");
const info = document.getElementById("info");

let pageFlip = null;

/* Detecta celular */
function esCelular() {
  return window.innerWidth <= 768;
}

/* =========================================================
   CREA UNA PÁGINA DEL PDF
========================================================= */
async function crearPaginaPDF(pdf, numeroPagina) {
  const page = await pdf.getPage(numeroPagina);

  const viewport = page.getViewport({
    scale: esCelular() ? 1.3 : 1.7
  });

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = viewport.width;
  canvas.height = viewport.height;

  await page.render({
    canvasContext: ctx,
    viewport: viewport
  }).promise;

  const pageDiv = document.createElement("div");
  pageDiv.className = "page";
  pageDiv.appendChild(canvas);

  return pageDiv;
}

/* =========================================================
   CARGA EL PDF Y CONSTRUYE EL LIBRO
========================================================= */
async function cargarPDF() {
  try {
    const pdf = await pdfjsLib.getDocument(url).promise;

    info.textContent = "Preparando libro...";
    bookContainer.innerHTML = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const pagina = await crearPaginaPDF(pdf, i);
      bookContainer.appendChild(pagina);
    }

    pageFlip = new St.PageFlip(bookContainer, {
      width: esCelular() ? 320 : 450,
      height: esCelular() ? 480 : 620,

      /*
        En PC usamos fixed para que no brinque la portada.
        En celular usamos stretch para que se adapte a la pantalla.
      */
      size: esCelular() ? "stretch" : "fixed",

      minWidth: 260,
      maxWidth: 1000,
      minHeight: 360,
      maxHeight: 1400,

      /*
        La página 1 del PDF queda como portada.
        Al abrir: páginas 2 y 3 juntas.
      */
      showCover: true,

      /*
        En celular muestra una página a la vez.
        En PC muestra libro abierto.
      */
      usePortrait: esCelular(),

      /*
        false ayuda a que el gesto del dedo funcione mejor
        para pasar hojas en móvil.
      */
      mobileScrollSupport: false,

      startPage: 0,
      flippingTime: 1200,
      drawShadow: true,
      maxShadowOpacity: 0.28,

      /*
        En celular sí se autoajusta.
        En PC no, para evitar desplazamiento raro.
      */
      autoSize: esCelular() ? true : false,

      startZIndex: 10,
      clickEventForward: true,
      useMouseEvents: true,
      swipeDistance: 20
    });

    const paginas = Array.from(document.querySelectorAll(".page"));
    pageFlip.loadFromHTML(paginas);

    setTimeout(() => {
      pageFlip.update();
    }, 300);

    info.textContent = "Portada";

    pageFlip.on("flip", (e) => {
      const paginaActual = e.data + 1;

      if (paginaActual === 1) {
        info.textContent = "Portada";
      } else {
        info.textContent = `Página ${paginaActual}`;
      }
    });

  } catch (error) {
    console.error(error);
    info.textContent = "No se pudo cargar el PDF.";

    alert("No se pudo cargar el PDF. Revisa que el archivo exista en: pdf/el-desahogo.pdf");
  }
}

/* Inicia el programa */
cargarPDF();
</script>

</body>
</html>
