<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- Hace que el diseño se adapte correctamente a celulares -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Desahogo - Libro Digital</title>

<style>
/*=========================================================
                    AJUSTE GENERAL
=========================================================*/

* {
    box-sizing: border-box;
}

/*=========================================================
                    CUERPO DE LA PÁGINA
=========================================================*/

body {
    margin: 0;
    min-height: 100vh;

    background: radial-gradient(circle, #2b2b3d, #111118);

    display: flex;
    justify-content: center;
    align-items: center;

    font-family: Arial, sans-serif;
    overflow: auto;
}

/*=========================================================
                    CONTENEDOR PRINCIPAL
=========================================================*/

#contenedor {
    width: 100%;
    text-align: center;
    color: white;
    padding: 15px;
}

/*=========================================================
                    TÍTULO
=========================================================*/

h1 {
    margin: 10px 0 15px;
    font-size: clamp(22px, 5vw, 38px);
    color: #d4af37;
}

/*=========================================================
                    CONTENEDOR DEL LIBRO
=========================================================*/

#book {
    width: 900px;
    height: 620px;
    margin: auto;
}

/*=========================================================
                    CADA PÁGINA DEL LIBRO
=========================================================*/

.page {
    background: white;
    overflow: hidden;
}

/*=========================================================
                    CANVAS DEL PDF
=========================================================*/

.page canvas {
    width: 100%;
    height: 100%;
    display: block;
}

/*=========================================================
                    TEXTO DE INFORMACIÓN
=========================================================*/

#info {
    margin-top: 15px;
    font-size: 15px;
    color: #ddd;
}

/*=========================================================
                    AJUSTE PARA CELULAR
=========================================================*/

@media (max-width: 768px) {

    body {
        align-items: flex-start;
    }

    #contenedor {
        padding: 10px;
    }

    #book {
        width: 95vw;
        height: 70vh;
    }

    h1 {
        font-size: 24px;
    }
}
</style>
</head>

<body>

<div id="contenedor">

    <!-- Título visible del proyecto -->
    <h1>El Desahogo</h1>

    <!-- Aquí se construye automáticamente el libro -->
    <div id="book"></div>

    <!-- Estado actual del libro -->
    <div id="info">Cargando PDF...</div>

</div>

<!--=======================================================
                    LIBRERÍA PDF.JS
    Se encarga de leer y renderizar el archivo PDF.
========================================================-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!--=======================================================
                    LIBRERÍA PAGEFLIP
    Se encarga de crear la animación de libro.
========================================================-->
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>
/*=========================================================
                    CONFIGURACIÓN GENERAL
=========================================================*/

/*
    Nombre exacto del archivo PDF.

    IMPORTANTE:
    El nombre debe coincidir exactamente con el archivo
    que está en el repositorio.

    En este caso:

    Repositorio/
    ├── index.html
    └── El Desahogo.pdf
*/

const CONFIG = {

    archivoPDF: "El Desahogo.pdf"

};

/*
    encodeURI convierte espacios y caracteres especiales
    para que el navegador pueda leer correctamente la ruta.

    Ejemplo:

    "El Desahogo.pdf"
            ↓
    "El%20Desahogo.pdf"
*/

const url = encodeURI(CONFIG.archivoPDF);

/*=========================================================
                    CONFIGURACIÓN PDF.JS
=========================================================*/

/*
    Worker de PDF.js.

    Sirve para procesar el PDF sin congelar toda la página.
*/

pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/*=========================================================
                    ELEMENTOS DEL HTML
=========================================================*/

/*
    bookContainer:
    Es el div donde se van a insertar todas las páginas.

    info:
    Es el texto inferior que indica si está cargando,
    si está en portada o en una página.
*/

const bookContainer = document.getElementById("book");
const info = document.getElementById("info");

/*=========================================================
                    VARIABLE DEL LIBRO
=========================================================*/

/*
    Aquí se guarda el objeto PageFlip después de crearlo.
*/

let pageFlip = null;

/*=========================================================
                    DETECTAR CELULAR
=========================================================*/

/*
    Devuelve true si el ancho de pantalla es menor o igual
    a 768 px.

    Esto nos permite usar una configuración para celular
    y otra para computadora.
*/

function esCelular() {
    return window.innerWidth <= 768;
}

/*=========================================================
                    CREAR UNA PÁGINA DEL PDF
=========================================================*/

/*
    Esta función convierte una página del PDF en una hoja
    visible dentro del libro.

    Pasos:
    1. Obtiene la página del PDF.
    2. Crea un canvas.
    3. Dibuja la página dentro del canvas.
    4. Mete el canvas dentro de un div con clase "page".
*/

async function crearPaginaPDF(pdf, numeroPagina) {

    const page = await pdf.getPage(numeroPagina);

    /*
        scale controla la calidad de renderizado.

        En celular se usa menos escala para no consumir
        tanta memoria.

        En PC se usa más escala para mejor calidad.
    */

    const viewport = page.getViewport({
        scale: esCelular() ? 1.3 : 1.7
    });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
        canvasContext: ctx,
        viewport: viewport
    }).promise;

    const pageDiv = document.createElement("div");
    pageDiv.className = "page";

    pageDiv.appendChild(canvas);

    return pageDiv;
}

/*=========================================================
                    CARGAR PDF Y CONSTRUIR LIBRO
=========================================================*/

/*
    Esta es la función principal.

    Hace lo siguiente:
    1. Carga el PDF.
    2. Convierte cada página en una hoja.
    3. Inserta las hojas en el libro.
    4. Activa PageFlip.
*/

async function cargarPDF() {

    try {

        const pdf = await pdfjsLib.getDocument(url).promise;

        info.textContent = "Preparando libro...";

        bookContainer.innerHTML = "";

        /*
            ORDEN DEL LIBRO:

            Página 1 del PDF = portada sola.

            Al abrir la portada:
            Página 2 y página 3 aparecen juntas.

            Después:
            Página 4 y página 5 juntas.
            Página 6 y página 7 juntas.
        */

        for (let i = 1; i <= pdf.numPages; i++) {

            const pagina = await crearPaginaPDF(pdf, i);

            bookContainer.appendChild(pagina);
        }

        /*=================================================
                    CONFIGURACIÓN PAGEFLIP
        =================================================*/

        pageFlip = new St.PageFlip(bookContainer, {

            /*
                Tamaño base.

                En celular:
                320 x 480

                En computadora:
                cada página mide 450 x 620.
                El libro abierto mide aproximadamente 900 x 620.
            */

            width: esCelular() ? 320 : 450,
            height: esCelular() ? 480 : 620,

            /*
                En PC usamos "fixed" para evitar que la portada
                haga un desplazamiento raro al abrir.

                En celular usamos "stretch" para que se adapte
                mejor a la pantalla.
            */

            size: esCelular() ? "stretch" : "fixed",

            /*
                Límites de tamaño del libro.
            */

            minWidth: 260,
            maxWidth: 1000,
            minHeight: 360,
            maxHeight: 1400,

            /*
                showCover true hace que la primera página sea
                portada individual.

                Con esto queda:

                Portada sola
                    ↓
                Página 2 y 3 juntas
            */

            showCover: true,

            /*
                En celular se usa modo retrato para que se vea
                una sola página y no se aplaste el libro.
            */

            usePortrait: esCelular(),

            /*
                false permite que el gesto del dedo controle mejor
                el cambio de página.
            */

            mobileScrollSupport: false,

            /*
                Página inicial.
                0 significa iniciar en la portada.
            */

            startPage: 0,

            /*
                Duración de la animación al pasar hoja.
                Más alto = más lento y elegante.
            */

            flippingTime: 1200,

            /*
                Sombras realistas al pasar página.
            */

            drawShadow: true,

            /*
                Intensidad de la sombra.
            */

            maxShadowOpacity: 0.28,

            /*
                En celular se permite autoajuste.
                En PC se evita para que no haya saltos.
            */

            autoSize: esCelular(),

            /*
                Controla el orden visual de las hojas.
            */

            startZIndex: 10,

            /*
                Permite pasar páginas con clic.
            */

            clickEventForward: true,

            /*
                Permite usar mouse.
            */

            useMouseEvents: true,

            /*
                Distancia mínima del gesto swipe en celular.
            */

            swipeDistance: 20
        });

        /*
            Carga todas las páginas HTML dentro de PageFlip.
        */

        const paginas = Array.from(document.querySelectorAll(".page"));

        pageFlip.loadFromHTML(paginas);

        /*
            Actualiza PageFlip después de cargar.
            Esto ayuda a corregir el acomodo visual inicial.
        */

        setTimeout(() => {
            pageFlip.update();
        }, 300);

        info.textContent = "Portada";

        /*=================================================
                    EVENTO AL PASAR PÁGINA
        =================================================*/

        pageFlip.on("flip", (e) => {

            /*
                e.data es el índice interno de PageFlip.

                Como empieza en 0, sumamos 1.
            */

            const paginaActual = e.data + 1;

            if (paginaActual === 1) {
                info.textContent = "Portada";
            } else {
                info.textContent = `Página ${paginaActual}`;
            }
        });

    } catch (error) {

        console.error(error);

        info.textContent = "No se pudo cargar el PDF.";

        alert(
            "No se pudo cargar el PDF. Revisa que el archivo se llame exactamente: El Desahogo.pdf"
        );
    }
}

/*=========================================================
                    INICIAR PROGRAMA
=========================================================*/

cargarPDF();
</script>

</body>
</html>
